name: Build Kirin 710 Kernel

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout kernel source
      run: |
        git clone --depth=1 https://github.com/dirt2022/huawei_kirin710_kernel.git kernel

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y build-essential clang gcc-aarch64-linux-gnu bc device-tree-compiler libssl-dev
        clang --version

    - name: Create tools symlink
      run: |
        sudo mkdir -p /tools
        sudo ln -s /usr/bin/dtc /tools/dtc

    - name: Sync KernelSU
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main || true
        if [ -f sepolicy.c ]; then
          cp sepolicy.c KernelSU/kernel/selinux/ 2>/dev/null || true
        fi

    - name: Configure kernel
      run: |
        cd kernel
        mkdir -p out
        make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- O=out merge_kirin710_defconfig

    - name: Build kernel
      run: |
        cd kernel
        set +e
        make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- O=out -j$(nproc) 2>&1 | tee build.log
        echo "Build exit code: ${PIPESTATUS[0]}"
        echo "=== Errors ==="
        grep -i "error:" build.log | head -30
        echo "=== Warnings (last 10) ==="
        grep -i "warning:" build.log | tail -10

    - name: Check result
      if: always()
      run: |
        cd kernel
        ls -la out/arch/arm64/boot/ 2>/dev/null || echo "No boot dir"
        find out -name "Image*" 2>/dev/null
        if [ -f out/arch/arm64/boot/Image ]; then
          cp out/arch/arm64/boot/Image ../kernel_Image
          echo "SUCCESS!"
        elif [ -f out/arch/arm64/boot/Image.gz ]; then
          cp out/arch/arm64/boot/Image.gz ../kernel_Image.gz
          echo "SUCCESS (gz)!"
        fi

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kirin710-build
        path: |
          kernel_Image
          kernel_Image.gz
          kernel/build.log
        retention-days: 30
        if-no-files-found: warn
